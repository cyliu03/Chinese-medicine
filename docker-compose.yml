version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_MODEL_API_URL=http://backend:8000
    depends_on:
      - backend

  backend:
    build:
      context: ./server
      dockerfile: ./server/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./checkpoints:/app/checkpoints
      - ./data:/app/data

volumes:
  checkpoints:
  data:
