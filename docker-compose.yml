version: '3.8'

services:
  # 前端服务
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_MODEL_API_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - tcm-network

  # 后端服务
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - MODEL_PATH=/app/model/best_model.pt
      - VOCAB_DIR=/app/model
    volumes:
      - ./training/checkpoints:/app/model
      - ./data/chatmed:/app/vocab
    networks:
      - tcm-network

networks:
  tcm-network:
    driver: bridge